<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Technical SEO Meta Tags -->
    <title>404: Search Intent Lost | Mojaddid Shashwoto</title>
    <meta name="robots" content="noindex, follow">
    
    <!-- Font preconnects for speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css?v=1.2">
    
    <!-- Custom SVG Favicon (Search Node / Arrow) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='seo-grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%2310B981'/%3E%3Cstop offset='100%25' stop-color='%233B82F6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='18' cy='18' r='10' stroke='url(%23seo-grad)' stroke-width='3'/%3E%3Cpath d='M 25 25 L 34 34' stroke='url(%23seo-grad)' stroke-width='3' stroke-linecap='round'/%3E%3Cpath d='M 12 20 L 18 14 L 24 20' stroke='%2310B981' stroke-width='2' stroke-linejoin='round' stroke-linecap='round'/%3E%3C/svg%3E">

    <style>
        .error-card {
            max-width: 600px;
            padding: 3.5rem 2.5rem;
            margin: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            line-height: 1;
            font-family: var(--font-heading);
            background: linear-gradient(135deg, var(--color-accent) 0%, var(--color-accent-blue) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.05em;
        }
        .error-headline {
            font-size: 2rem;
            margin: 0;
            letter-spacing: -0.03em;
        }
        .error-desc {
            color: var(--color-text-muted);
            font-size: 0.95rem;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        .error-redirect {
            font-size: 0.85rem;
            color: var(--color-accent);
            font-weight: 600;
            background: var(--color-accent-glow);
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            margin-bottom: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }
        .error-actions .btn {
            width: 100%;
        }
    </style>
</head>

<body class="no-scroll" style="display: flex; align-items: center; justify-content: center; min-height: 100vh;">

    <!-- Glowing Interactive Grid Background -->
    <div class="gradient-mesh">
        <div class="grid-overlay"></div>
        <div class="mesh-blob mesh-blob-1"></div>
        <div class="mesh-blob mesh-blob-2"></div>
        <div class="mesh-blob mesh-blob-3"></div>
    </div>

    <!-- Center Card -->
    <div class="container" style="display: flex; align-items: center; justify-content: center;">
        <div class="panel error-card reveal is-visible">
            <div class="error-code">404</div>
            <h1 class="error-headline">Search Intent Lost</h1>
            <p class="error-desc">
                The page you are looking for has either been crawled away, updated, or is temporarily offline. Let's redirect you back to a high-ROI destination.
            </p>
            
            <div class="error-redirect" id="countdown-banner">
                Redirecting to homepage in <span id="countdown">10</span>s...
            </div>

            <div class="error-actions">
                <a href="/" class="btn btn--primary magnetic">Go to Homepage</a>
                <a href="/gbp-audit-checklist/" class="btn btn--outline magnetic">GBP Audit Checklist</a>
                <a href="/local-seo-freelancer/" class="btn btn--outline magnetic">Local SEO Services</a>
            </div>
        </div>
    </div>

    <script>
        // Redirect countdown
        let seconds = 10;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = "/";
            }
        }, 1000);
    </script>
</body>

</html>
